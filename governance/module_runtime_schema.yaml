version: 1.0
phase: Phase-2.4B
mode: OBSERVE_ONLY
purpose: Runtime monitoring structure for all governance, research, execution, and cockpit modules.

# ==================================================
# 所有模块定义（source of truth）
# runtime_usage_summary.json 由此自动生成
# ==================================================
layers:
  execution_layer:
    - name: OpenClaw
      enabled: true
    - name: kline_update
      enabled: true
    - name: symbol_normalizer
      enabled: true
    - name: coverage_monitor
      enabled: true
    - name: report_pipeline
      enabled: true

  research_layer:
    - name: robot_2
      enabled: true
    - name: robot_3
      enabled: true
    - name: robot_4
      enabled: true

  governance_layer:
    - name: robot_5
      enabled: true
    - name: consensus_engine
      enabled: true
    - name: replay_engine
      enabled: true
    - name: integrity_check
      enabled: true
    - name: audit_engine
      enabled: true
    - name: governance_controller
      enabled: true
    - name: snapshot_generator
      enabled: true

  cockpit_layer:
    - name: dashboard_snapshot
      enabled: true
    - name: widget_runtime
      enabled: true
    - name: cockpit_sync
      enabled: true

runtime_schema:
  required_fields:
    - module_name
    - runtime_status
    - call_count
    - last_execution
    - error_count
    - governance_state

constraints:
  immutable_runtime_logs: true
  github_sync_required: true
  no_hidden_runtime: true

status: active
