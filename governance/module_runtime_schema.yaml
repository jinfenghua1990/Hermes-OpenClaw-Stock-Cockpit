version: 2.2
phase: Phase-2.6B
mode: OBSERVE_ONLY
purpose: Runtime monitoring structure — aligned with actual runtime_event integration (21 modules).

# ==================================================
# 所有模块定义（source of truth）
# runtime_usage_summary.json 由此自动生成
# 更新于 2026-05-13: 对齐实际 Runtime Event 接入
# ==================================================
layers:
  execution_layer:
    - name: openclaw_fetch_sh
      enabled: true
      script: cron/scripts/openclaw_fetch.sh
      note: OpenClaw 数据采集

    - name: feature_engine_sh
      enabled: true
      script: cron/scripts/feature_engine.sh
      note: 技术因子计算

    - name: coverage_monitor
      enabled: true
      script: data_quality/coverage_monitor.py
      note: 数据覆盖率监控

    - name: report_pipeline
      enabled: true
      script: cron/scripts/main_aggregate.sh
      note: 日报流水线（pre_market / daily_review）

    - name: daily_pipeline
      enabled: true
      script: scripts/daily_pipeline.sh
      note: 全日流水线（8步）

    - name: paper_trade_executor
      enabled: true
      script: scripts/paper_trade_executor.py
      note: 模拟盘交易执行

    - name: notification_router
      enabled: true
      script: cron/scripts/notification_router.py
      note: 飞书通知路由

    - name: position_manager
      enabled: true
      script: paper_trading/position_manager.py
      note: 持仓管理器（Phase-2.5）

    - name: pnl_tracker
      enabled: true
      script: paper_trading/pnl_tracker.py
      note: 盈亏追踪器（Phase-2.5）

    - name: action_engine
      enabled: true
      script: research/ranking_engine.py
      note: AI动作引擎，生成 Top Picks（Phase-2.6B）

    - name: paper_decision_engine
      enabled: true
      script: paper_trading/paper_decision_engine.py
      note: Paper 自动决策层，基于 Top Picks 生成交易决策（Phase-2.6B）

  governance_layer:
    - name: risk_controller
      enabled: true
      script: paper_trading/risk_controller.py
      note: 风控控制器（Phase-2.5）
    - name: scheduler_sh
      enabled: true
      script: cron/scripts/scheduler.sh
      note: 定时调度中枢

    - name: replay_market_day
      enabled: true
      script: replay_engine/replay_market_day.py
      note: 市场日回放

    - name: event_engine
      enabled: true
      script: scripts/event_engine.py
      note: 盘中事件引擎

    - name: daily_health_check
      enabled: true
      script: system_health/daily_health_check.py
      note: 每日健康检查

    - name: position_adapter
      enabled: true
      script: scripts/position_adapter.py
      note: 持仓数据适配

    - name: robot5_risk_sh
      enabled: true
      script: cron/scripts/robot5_risk.sh
      note: 风控检查

    - name: main_aggregate_sh
      enabled: true
      script: cron/scripts/main_aggregate.sh
      note: 聚合报告

  cockpit_layer:
    - name: rolling_snapshot
      enabled: true
      script: cron/scripts/rolling_snapshot.py
      note: 盘中滚动快照

    - name: heartbeat_monitor
      enabled: true
      script: cron/scripts/heartbeat_monitor.py
      note: 心跳监控

    - name: robot4_match_sh
      enabled: true
      script: cron/scripts/robot4_match.sh
      note: 策略匹配

    - name: cockpit_frontend
      enabled: true
      script: frontend/
      note: Cockpit本地UI（Phase-2.5）

runtime_schema:
  required_fields:
    - module_name
    - runtime_status
    - call_count
    - last_execution
    - error_count
    - governance_state

constraints:
  immutable_runtime_logs: true
  github_sync_required: true
  no_hidden_runtime: true

status: active
