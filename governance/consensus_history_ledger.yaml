version: 1.0
phase: Phase-2.4B
mode: OBSERVE_ONLY
purpose: Historical tracking structure for finalized consensus outputs.

ledger_fields:
  required:
    - ledger_id
    - symbol
    - timestamp
    - participating_robots
    - consensus_label
    - final_score
    - risk_level
    - governance_state
    - replay_reference
    - outcome_reference

tracking:
  enabled: true
  immutable_history: true
  replay_reference_required: true

constraints:
  no_auto_learning: true
  no_auto_weight_adjustment: true
  no_auto_strategy_adjustment: true
  user_review_required: true

storage:
  path: governance/consensus_ledger/
  github_sync_required: true

status: active
