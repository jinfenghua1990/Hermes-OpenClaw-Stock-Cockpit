# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【三、治理规则】
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

governance_rules:
  dynamic_robot_creation: false
  temporary_role_creation: false
  unregistered_robot_access: blocked
  official_robot_registry_required: true

  # 变更审批（任何团队变更均需人工审核）
  change_approval:
    required: true
    approver: MAIN + 用户确认
    workflow: create_pr → user_audit → merge

  # 审计周期
  audit_schedule:
    frequency: 每周一次
    items:
      - 检查 robot 成员是否越权
      - 检查是否有未注册 robot 被调用
      - 检查 Governance 文件未被篡改
      - 检查 Freeze 状态是否被解除
